<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <link rel="icon" type="image/svg+xml" href="/station-os-icon.svg" />
  <link rel="apple-touch-icon" href="/station-os-icon.svg" />
  <meta name="theme-color" content="#f59e0b" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Station-OS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Station-OS: Inteligencia operativa para red de estaciones de servicio" />
  <title>Station-OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Leaflet CSS is imported via npm in index.tsx -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      /* Gray-100 equivalent for Google Maps Light feel */
      overflow: hidden;
      /* App-like feel */
      transition: background-color 0.5s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .dark body {
      background-color: #0f172a;
    }

    /* Custom Scrollbar for sleek look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-track { background: #1e293b; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 100px; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Leaflet overrides */
    .leaflet-container {
      width: 100%;
      height: 100%;
      background: #e5e7eb;
      z-index: 0;
    }

    /* Hide attribution for cleaner UI in this demo (not recommended for prod) */
    .leaflet-control-attribution {
      display: none;
    }

    /* Hide zoom controls on mobile — touch gestures are enough */
    @media (max-width: 768px) {
      .leaflet-control-zoom {
        display: none !important;
      }
    }

    /* Bigger, more visible zoom controls (desktop only) */
    .leaflet-control-zoom a {
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
      font-size: 20px !important;
      font-weight: bold !important;
      border-radius: 12px !important;
      background: white !important;
      color: #1f2937 !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
      border: none !important;
    }

    .leaflet-control-zoom a:hover {
      background: #f3f4f6 !important;
    }

    .leaflet-control-zoom {
      border: none !important;
      border-radius: 14px !important;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12) !important;
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
