# Station-OS Edge Agent Configuration
# Copy this file and fill in your values.
# NEVER commit real API keys to version control.
# Load secrets from .env file using python-dotenv.

# ─── Supabase ───────────────────────────────────────────────────────────────
supabase:
  url: "https://YOUR_PROJECT_REF.supabase.co"
  # Use service_role key — bypasses RLS for trusted backend inserts.
  # Load from environment: SUPABASE_SERVICE_KEY
  service_key_env: "SUPABASE_SERVICE_KEY"

# ─── File Watcher ───────────────────────────────────────────────────────────
watcher:
  # Root path where the legacy VB system writes .TXT files.
  # Each station has its own subfolder named by station_code.
  watch_path: "C:\\SVAPP"

  # File extensions to monitor (case-insensitive)
  watched_extensions:
    - ".txt"
    - ".TXT"

  # Seconds to wait after a file event before processing
  # (debounce: VB may write files in multiple chunks)
  debounce_seconds: 2

  # Maximum file size to process (bytes). Reject oversized files as corrupt.
  max_file_size_bytes: 52428800  # 50 MB

# ─── Station Mappings ───────────────────────────────────────────────────────
# Maps the subfolder name in D:\SVAPP to the Supabase UUID of the station.
# Add one entry per station. The subfolder name becomes the station_code.
# Example: D:\SVAPP\EST_001\ → station UUID "uuid-here"
stations:
  EST_001: "REPLACE_WITH_SUPABASE_UUID"
  EST_002: "REPLACE_WITH_SUPABASE_UUID"
  # Add up to 60 stations here...

# ─── Reconciliation ─────────────────────────────────────────────────────────
reconciliation:
  # Tolerance for P+S total vs VE sum comparison.
  # 0.001 = 0.1% — any difference above this triggers a DISCREPANCY alert.
  cash_variance_tolerance: 0.001

# ─── Alerts ─────────────────────────────────────────────────────────────────
alerts:
  # Minimum stock in liters below which a WARNING alert is fired.
  min_tank_liters: 800

  # Minimum stock in liters below which a CRITICAL alert is fired.
  critical_tank_liters: 300

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/edge_agent.log"
  max_bytes: 10485760    # 10 MB per file
  backup_count: 5

# ─── Retry ──────────────────────────────────────────────────────────────────
retry:
  attempts: 3
  wait_seconds: 5
  # Files that fail after all retries are written to dead_letter_path.
  dead_letter_path: "logs/dead_letter/"
